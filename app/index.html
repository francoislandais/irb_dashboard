<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Application locale CSV</title>
    <link rel="stylesheet" href="./src/styles.css?v=20260704-standalone-export">
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="brand">
          <button id="sidebar-toggle" class="sidebar-toggle" type="button" aria-label="Masquer la navigation" aria-expanded="true">
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
            <span aria-hidden="true"></span>
          </button>
          <strong>Agora Explorer</strong>
        </div>

        <section class="global-bar" aria-label="Paramètres globaux">
          <label class="field compact-field">
            <span>JST</span>
            <select id="jst-select" disabled>
              <option value="">Chargez un CSV</option>
            </select>
          </label>
          <label class="field compact-field">
            <span>Unité</span>
            <select id="unit-select">
              <option value="millions" selected>Millions EUR</option>
              <option value="billions">Milliards EUR</option>
              <option value="thousands">K EUR</option>
              <option value="euros">EUR</option>
            </select>
          </label>
        </section>
      </header>

      <aside class="sidebar" aria-label="Modules">
        <nav class="module-list" aria-label="Navigation des modules">
          <button class="module-link is-active" type="button" data-module-target="module-2">Reporting</button>
          <button class="module-link" type="button" data-module-target="cet-1">CET 1</button>
        </nav>

        <section class="sidebar-data-source" aria-label="Source des données locales">
          <div>
            <h2>Source CSV</h2>
            <p id="file-status">Aucun fichier chargé.</p>
          </div>

          <button id="choose-file-button" class="sidebar-button primary" type="button">
            Choisir un CSV
          </button>
          <div class="sidebar-actions">
            <button id="reload-file-button" class="sidebar-button" type="button" disabled>
              Recharger
            </button>
            <button id="forget-file-button" class="sidebar-button danger" type="button" disabled>
              Oublier
            </button>
          </div>
          <button id="export-standalone-button" class="sidebar-button" type="button" disabled>
            Exporter HTML portable
          </button>

          <div id="support-notice" class="sidebar-notice" hidden></div>

          <dl class="sidebar-stats" aria-label="Résumé des données">
            <div>
              <dt>Lignes</dt>
              <dd id="row-count">0</dd>
            </div>
            <div>
              <dt>Colonnes</dt>
              <dd id="column-count">0</dd>
            </div>
            <div>
              <dt>Fichier</dt>
              <dd id="file-name">-</dd>
            </div>
          </dl>
        </section>
      </aside>

      <main class="main-view">
        <section id="module-2-view" class="module-view module-2-view is-visible" aria-label="Reporting">
          <article class="metric-panel">
            <div id="module-2-empty" class="notice" hidden></div>

            <div class="axis-tabs" role="tablist" aria-label="Axe du tableau">
              <button class="axis-tab" type="button" role="tab" aria-selected="false" data-module-2-axis="template">
                <span class="axis-tab-title">template</span>
                <span class="axis-tab-value" data-axis-caption="template">-</span>
              </button>
              <button class="axis-tab is-active" type="button" role="tab" aria-selected="true" data-module-2-axis="y">
                <span class="axis-tab-title">row</span>
                <span class="axis-tab-value" data-axis-caption="y">-</span>
              </button>
              <button class="axis-tab" type="button" role="tab" aria-selected="false" data-module-2-axis="x">
                <span class="axis-tab-title">column</span>
                <span class="axis-tab-value" data-axis-caption="x">-</span>
              </button>
              <button class="axis-tab" type="button" role="tab" aria-selected="false" data-module-2-axis="z" hidden>
                <span class="axis-tab-title">tab</span>
                <span class="axis-tab-value" data-axis-caption="z">-</span>
              </button>
            </div>
            <div class="metric-table-wrap">
              <table id="module-2-table" class="metric-table" aria-label="Série temporelle RWA IRB"></table>
            </div>
          </article>
        </section>

        <section id="cet-1-view" class="module-view" aria-label="CET 1"></section>
      </main>
    </div>

    <input id="fallback-file-input" type="file" accept=".csv,text/csv" hidden>
    <script type="module" src="./src/main.js?v=20260704-standalone-export"></script>
  </body>
</html>
